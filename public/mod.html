<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>contentServer — Moderator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13;
      --surface: #1c1c24;
      --surface2: #25252f;
      --surface3: #2e2e3c;
      --border: #2e2e3a;
      --accent: #7c6fff;
      --accent-dark: #5a4fe0;
      --green: #4caf7d;
      --red: #e05555;
      --amber: #e09940;
      --text: #e8e8f0;
      --muted: #888898;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ─── Login ─── */
    #login-screen {
      min-height: 100svh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
    }
    #login-screen h1 { margin-bottom: 24px; }
    #login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 14px; }
    #login-box input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; padding: 10px 14px; width: 100%; }
    #login-box input:focus { outline: none; border-color: var(--accent); }
    #login-btn { background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 700; padding: 12px; cursor: pointer; }
    #login-btn:hover { filter: brightness(1.1); }
    #login-error { color: #ff6b6b; font-size: 0.85rem; min-height: 18px; }

    /* ─── App shell ─── */
    #app { display: none; flex-direction: column; min-height: 100svh; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: var(--surface);
      border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; white-space: nowrap; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .hdr-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 7px 12px;
      font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); }

    /* ─── Event bar ─── */
    #event-bar {
      background: var(--surface2); border-bottom: 1px solid var(--border);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    #event-bar .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    #active-event-name {
      font-weight: 700; font-size: 1rem; flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #active-event-name.none { color: var(--muted); font-weight: 400; font-style: italic; }
    .event-bar-btn {
      background: var(--surface3); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 6px 12px; font-size: 0.82rem; cursor: pointer; white-space: nowrap;
    }
    .event-bar-btn:hover { border-color: var(--accent); }
    .event-bar-btn.danger:hover { border-color: var(--red); color: var(--red); }

    /* ─── Tabs ─── */
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 12px; background: none; border: none;
      color: var(--muted); font-size: 0.9rem; font-weight: 600; cursor: pointer;
      border-bottom: 3px solid transparent; transition: all 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn .badge {
      display: inline-block; background: var(--accent); color: #fff;
      border-radius: 20px; font-size: 0.7rem; padding: 1px 7px; margin-left: 5px;
    }
    .tab-pane { display: none; padding: 16px; }
    .tab-pane.active { display: block; }

    /* ─── Photo grid ─── */
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 14px; }
    .photo-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column;
    }
    .photo-card img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .photo-card .info { padding: 10px 12px; flex: 1; display: flex; flex-direction: column; gap: 3px; }
    .photo-card .submitter { font-weight: 600; font-size: 0.88rem; }
    .photo-card .caption-text { color: var(--muted); font-size: 0.8rem; }
    .photo-card .time { color: var(--muted); font-size: 0.73rem; }
    .photo-card .actions { padding: 0 12px 12px; display: flex; gap: 8px; }
    .btn-approve { flex: 1; background: var(--green); border: none; border-radius: 8px; color: #fff; padding: 8px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .btn-approve:hover { filter: brightness(1.1); }
    .btn-reject  { flex: 1; background: var(--red); border: none; border-radius: 8px; color: #fff; padding: 8px; font-weight: 700; cursor: pointer; font-size: 0.88rem; }
    .btn-reject:hover { filter: brightness(1.1); }
    .btn-remove  { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; cursor: pointer; font-size: 0.82rem; }
    .btn-remove:hover { border-color: var(--red); color: var(--red); }

    .empty-state { color: var(--muted); text-align: center; padding: 48px 16px; font-size: 0.9rem; }

    /* ─── Events list ─── */
    .events-list { display: flex; flex-direction: column; gap: 10px; max-width: 640px; }
    .event-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .event-row.is-active { border-color: var(--accent); }
    .event-row .ev-info { flex: 1; min-width: 0; }
    .event-row .ev-name { font-weight: 700; font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-row .ev-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .event-row .ev-active-chip {
      background: var(--accent); color: #fff; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; padding: 2px 9px; white-space: nowrap;
    }
    .event-row .ev-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-sm {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 5px 10px; font-size: 0.78rem; cursor: pointer; white-space: nowrap;
    }
    .btn-sm:hover { border-color: var(--accent); }
    .btn-sm.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-sm.primary:hover { filter: brightness(1.1); }

    /* ─── Modals ─── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65);
      align-items: center; justify-content: center; z-index: 100; padding: 16px;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: 28px; width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .modal-box h2 { font-size: 1.1rem; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
    .field input, .field textarea {
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.95rem; padding: 9px 12px; font-family: inherit;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .btn-cancel { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); padding: 9px 18px; cursor: pointer; font-size: 0.9rem; }
    .btn-save   { background: var(--accent); border: none; border-radius: 9px; color: #fff; padding: 9px 18px; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
    .btn-save:hover { filter: brightness(1.1); }
    .modal-error { color: #ff6b6b; font-size: 0.83rem; min-height: 16px; }

    /* QR modal */
    #qr-box { text-align: center; align-items: center; }
    #qr-box img { border-radius: 10px; background: #fff; padding: 8px; }
    #qr-url { font-size: 0.82rem; color: var(--muted); word-break: break-all; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <h1>🔒 Moderator Login</h1>
  <div id="login-box">
    <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
    <div id="login-error"></div>
    <button id="login-btn">Sign In</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>📸 contentServer</h1>
    <div class="header-right">
      <button class="hdr-btn" id="qr-btn">📱 QR Code</button>
      <button class="hdr-btn" id="logout-btn">Sign out</button>
    </div>
  </header>

  <!-- Event bar -->
  <div id="event-bar">
    <span class="label">Event:</span>
    <span id="active-event-name" class="none">No active event</span>
    <button class="event-bar-btn" id="manage-events-btn">Manage Events</button>
    <button class="event-bar-btn danger" id="end-event-btn" style="display:none">End Event</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="queue">Queue <span class="badge" id="queue-badge">0</span></button>
    <button class="tab-btn" data-tab="approved">Approved <span class="badge" id="approved-badge">0</span></button>
    <button class="tab-btn" data-tab="events">Events</button>
  </div>

  <div id="tab-queue" class="tab-pane active">
    <div id="queue-grid" class="photo-grid"></div>
  </div>
  <div id="tab-approved" class="tab-pane">
    <div id="approved-grid" class="photo-grid"></div>
  </div>
  <div id="tab-events" class="tab-pane">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button class="btn-sm primary" id="new-event-btn-list">+ New Event</button>
    </div>
    <div id="events-list" class="events-list"></div>
  </div>
</div>

<!-- New / Edit Event modal -->
<div class="modal-backdrop" id="event-modal">
  <div class="modal-box">
    <h2 id="event-modal-title">New Event</h2>
    <div class="field">
      <label for="ev-name">Name *</label>
      <input type="text" id="ev-name" placeholder="e.g. Sunday Morning Service" maxlength="100">
    </div>
    <div class="field">
      <label for="ev-date">Date</label>
      <input type="date" id="ev-date">
    </div>
    <div class="field">
      <label for="ev-desc">Description</label>
      <textarea id="ev-desc" placeholder="Optional notes…" maxlength="500"></textarea>
    </div>
    <div class="modal-error" id="event-modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="event-modal-cancel">Cancel</button>
      <button class="btn-save" id="event-modal-save">Save</button>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-backdrop" id="qr-modal">
  <div class="modal-box" id="qr-box">
    <h2>Upload URL</h2>
    <img id="qr-img" src="" alt="QR Code" width="220" height="220">
    <p id="qr-url"></p>
    <div class="modal-actions" style="justify-content:center">
      <button class="btn-cancel" id="qr-close">Close</button>
    </div>
  </div>
</div>

<script>
  let token = '';
  let ws = null;
  let activeEventId = null;
  let editingEventId = null; // null = creating new

  // ── Auth ──────────────────────────────────────────────────────────────────
  const loginScreen = document.getElementById('login-screen');
  const appEl = document.getElementById('app');

  async function doLogin() {
    const pw = document.getElementById('pw-input').value;
    try {
      const res = await fetch('/api/mod/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw })
      });
      const data = await res.json();
      if (data.ok) {
        token = pw;
        loginScreen.style.display = 'none';
        appEl.style.display = 'flex';
        init();
      } else {
        document.getElementById('login-error').textContent = data.error || 'Wrong password';
      }
    } catch { document.getElementById('login-error').textContent = 'Connection error'; }
  }
  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('logout-btn').addEventListener('click', () => {
    token = ''; if (ws) ws.close();
    appEl.style.display = 'none'; loginScreen.style.display = '';
  });

  // ── API helpers ────────────────────────────────────────────────────────────
  function modFetch(url, opts = {}) {
    opts.headers = { ...(opts.headers || {}), 'Authorization': 'Bearer ' + token };
    return fetch(url, opts);
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function timeAgo(unixSec) {
    const diff = Math.floor(Date.now() / 1000) - unixSec;
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    return `${Math.floor(diff/3600)}h ago`;
  }

  // ── Event bar ──────────────────────────────────────────────────────────────
  function setActiveEventDisplay(event) {
    const nameEl = document.getElementById('active-event-name');
    const endBtn = document.getElementById('end-event-btn');
    if (event) {
      activeEventId = event.id;
      nameEl.textContent = event.name + (event.date ? ` — ${event.date}` : '');
      nameEl.classList.remove('none');
      endBtn.style.display = '';
    } else {
      activeEventId = null;
      nameEl.textContent = 'No active event';
      nameEl.classList.add('none');
      endBtn.style.display = 'none';
    }
  }

  document.getElementById('end-event-btn').addEventListener('click', async () => {
    if (!activeEventId) return;
    if (!confirm('End the current event? Uploads will be paused until a new event is activated.')) return;
    await modFetch(`/api/mod/events/${activeEventId}/deactivate`, { method: 'POST' });
    setActiveEventDisplay(null);
    await loadQueue(); await loadApproved(); await loadEventsList();
  });

  document.getElementById('manage-events-btn').addEventListener('click', () => {
    switchTab('events');
    loadEventsList();
  });

  // ── Events tab ─────────────────────────────────────────────────────────────
  async function loadEventsList() {
    const res = await modFetch('/api/mod/events');
    const events = await res.json();
    const list = document.getElementById('events-list');
    list.innerHTML = '';
    if (!events.length) {
      list.innerHTML = '<div class="empty-state">No events yet — create one to get started.</div>';
      return;
    }
    events.forEach(ev => {
      const row = document.createElement('div');
      row.className = 'event-row' + (ev.active ? ' is-active' : '');
      row.dataset.id = ev.id;
      const meta = [ev.date, ev.description].filter(Boolean).join(' · ');
      row.innerHTML = `
        <div class="ev-info">
          <div class="ev-name">${esc(ev.name)}</div>
          ${meta ? `<div class="ev-meta">${esc(meta)}</div>` : ''}
        </div>
        ${ev.active ? '<span class="ev-active-chip">LIVE</span>' : ''}
        <div class="ev-actions">
          ${!ev.active ? `<button class="btn-sm primary" data-action="activate" data-id="${ev.id}">Activate</button>` : ''}
          <button class="btn-sm" data-action="edit" data-id="${ev.id}">Edit</button>
        </div>`;
      list.appendChild(row);
    });
  }

  // Event list actions (delegation)
  document.getElementById('events-list').addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = parseInt(btn.dataset.id, 10);
    if (btn.dataset.action === 'activate') {
      btn.disabled = true;
      const res = await modFetch(`/api/mod/events/${id}/activate`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        setActiveEventDisplay(data.event);
        await loadEventsList(); await loadQueue(); await loadApproved();
      }
    } else if (btn.dataset.action === 'edit') {
      openEventModal(id);
    }
  });

  // ── Event modal ────────────────────────────────────────────────────────────
  function openEventModal(id = null) {
    editingEventId = id;
    const modal = document.getElementById('event-modal');
    document.getElementById('event-modal-title').textContent = id ? 'Edit Event' : 'New Event';
    document.getElementById('event-modal-error').textContent = '';
    document.getElementById('ev-name').value = '';
    document.getElementById('ev-date').value = '';
    document.getElementById('ev-desc').value = '';

    if (id) {
      // Pre-fill from existing event
      modFetch(`/api/mod/events`).then(r => r.json()).then(events => {
        const ev = events.find(e => e.id === id);
        if (ev) {
          document.getElementById('ev-name').value = ev.name;
          document.getElementById('ev-date').value = ev.date || '';
          document.getElementById('ev-desc').value = ev.description || '';
        }
      });
    }
    modal.classList.add('open');
    setTimeout(() => document.getElementById('ev-name').focus(), 50);
  }

  document.getElementById('new-event-btn-list').addEventListener('click', () => openEventModal());
  document.getElementById('event-modal-cancel').addEventListener('click', () => {
    document.getElementById('event-modal').classList.remove('open');
  });

  document.getElementById('event-modal-save').addEventListener('click', async () => {
    const name = document.getElementById('ev-name').value.trim();
    const date = document.getElementById('ev-date').value;
    const description = document.getElementById('ev-desc').value.trim();
    const errEl = document.getElementById('event-modal-error');
    if (!name) { errEl.textContent = 'Name is required.'; return; }
    errEl.textContent = '';

    let res;
    if (editingEventId) {
      res = await modFetch(`/api/mod/events/${editingEventId}`, {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, date, description })
      });
    } else {
      res = await modFetch('/api/mod/events', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, date, description })
      });
    }
    const data = await res.json();
    if (data.ok) {
      document.getElementById('event-modal').classList.remove('open');
      await loadEventsList();
      if (data.event && data.event.active) setActiveEventDisplay(data.event);
    } else {
      errEl.textContent = data.error || 'Save failed.';
    }
  });

  // ── Photo rendering ────────────────────────────────────────────────────────
  function makeCard(photo, mode) {
    const card = document.createElement('div');
    card.className = 'photo-card'; card.dataset.id = photo.id;
    const name = photo.name || 'Anonymous';
    const caption = photo.caption || '';
    card.innerHTML = `
      <img src="/uploads/${photo.filename}" loading="lazy" alt="">
      <div class="info">
        <div class="submitter">${esc(name)}</div>
        ${caption ? `<div class="caption-text">"${esc(caption)}"</div>` : ''}
        <div class="time">${timeAgo(photo.created)}</div>
      </div>
      <div class="actions">
        ${mode === 'queue'
          ? `<button class="btn-approve" data-action="approve" data-id="${photo.id}">✓ Approve</button>
             <button class="btn-reject"  data-action="reject"  data-id="${photo.id}">✕ Reject</button>`
          : `<button class="btn-remove"  data-action="remove"  data-id="${photo.id}">Remove from display</button>`}
      </div>`;
    return card;
  }

  function renderEmpty(container, msg) {
    container.innerHTML = `<div class="empty-state">${msg}</div>`;
  }

  // ── Data loading ───────────────────────────────────────────────────────────
  async function loadQueue() {
    const res = await modFetch('/api/mod/queue');
    const photos = await res.json();
    const grid = document.getElementById('queue-grid');
    document.getElementById('queue-badge').textContent = photos.length;
    grid.innerHTML = '';
    if (!photos.length) {
      renderEmpty(grid, activeEventId ? 'No photos waiting — great!' : 'No active event. Activate one to start receiving uploads.');
      return;
    }
    photos.forEach(p => grid.appendChild(makeCard(p, 'queue')));
  }

  async function loadApproved() {
    const res = await modFetch('/api/mod/approved');
    const photos = await res.json();
    const grid = document.getElementById('approved-grid');
    document.getElementById('approved-badge').textContent = photos.length;
    grid.innerHTML = '';
    if (!photos.length) { renderEmpty(grid, 'No approved photos yet.'); return; }
    photos.forEach(p => grid.appendChild(makeCard(p, 'approved')));
  }

  // ── Photo actions ──────────────────────────────────────────────────────────
  document.addEventListener('click', async e => {
    const btn = e.target.closest('[data-action]');
    if (!btn || !token) return;
    if (['approve','reject','remove'].includes(btn.dataset.action)) {
      btn.disabled = true;
      const { action, id } = btn.dataset;
      if (action === 'approve') await modFetch(`/api/mod/approve/${id}`, { method: 'POST' });
      else if (action === 'reject') await modFetch(`/api/mod/reject/${id}`, { method: 'POST' });
      else if (action === 'remove') await modFetch(`/api/mod/remove/${id}`, { method: 'POST' });
      await loadQueue(); await loadApproved();
    }
  });

  // ── Tabs ───────────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    if (name === 'approved') loadApproved();
    if (name === 'events') loadEventsList();
  }
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // ── QR Code ────────────────────────────────────────────────────────────────
  document.getElementById('qr-btn').addEventListener('click', async () => {
    const res = await modFetch('/api/mod/qr');
    const data = await res.json();
    document.getElementById('qr-img').src = data.qr;
    document.getElementById('qr-url').textContent = data.url;
    document.getElementById('qr-modal').classList.add('open');
  });
  document.getElementById('qr-close').addEventListener('click', () => {
    document.getElementById('qr-modal').classList.remove('open');
  });

  // ── WebSocket ──────────────────────────────────────────────────────────────
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}`);
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'new_upload') loadQueue();
      else if (['approved','rejected','removed'].includes(msg.type)) { loadQueue(); loadApproved(); }
      else if (msg.type === 'event_changed' || msg.type === 'event_updated') {
        setActiveEventDisplay(msg.event);
        loadQueue(); loadApproved(); loadEventsList();
      }
    };
    ws.onclose = () => setTimeout(connectWs, 3000);
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  async function init() {
    // Load active event
    const evRes = await fetch('/api/event');
    const evData = await evRes.json();
    setActiveEventDisplay(evData.event);

    loadQueue();
    loadEventsList();
    connectWs();
    setInterval(loadQueue, 15000);
  }
</script>
</body>
</html>
